name: CI

on:
  push:
    branches: ["main", "feat/**", "test/**"]
  pull_request:
    branches: ["main"]

jobs:
  ruff:
    name: Ruff(lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run ruff linter
        run: uv run ruff check .
      
      - name: Run ruff formatter
        run: uv run ruff format --check .
  
  mypy:
    name: Mypy (type check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run mypy
        run: uv run mypy .

  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        
      redis:
        image: redis:8.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run Unit tests
        env:
        # Settings() 初始化需要
          SQLALCHEMY_DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost:5432/dummy
          REDIS_DATABASE_URL: redis://localhost:6379/0
          JWT_SECRET: dummy_secret_for_unit_tests
        run: uv run pytest app/tests/units --tb=short -q

      - name: Run Integration tests
        env:
          # Settings() 初始化需要（app 模組 import 時觸發）
          SQLALCHEMY_DATABASE_URL: postgresql+asyncpg://admin:admin@localhost:5432/testdb
          REDIS_DATABASE_URL: redis://localhost:6379/0
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          # conftest.py 用（TEST_ 開頭的變數指向 testdb）
          TEST_SQLALCHEMY_DATABASE_URL: postgresql+asyncpg://admin:admin@localhost:5432/testdb
          TEST_REDIS_DATABASE_URL: redis://localhost:6379/1
        run: uv run pytest app/tests/integrations --tb=short -q
  
  all-checks:
    name: All checks pass
    runs-on: ubuntu-latest
    needs: [ruff, mypy, pytest]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.ruff.result }}" != "success" || \
                "${{ needs.mypy.result }}" != "success" || \
                "${{ needs.pytest.result }}" != "success" ]]; then
            exit 1
          fi